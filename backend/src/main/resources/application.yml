spring:
  application:
    name: ground-zero-backend
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

jwt:
  secret: aW52YWxpZHNlY3JldGtleXRvYmVyZXBsYWNlZGluZGV2ZWxvcG1lbnRhc2Rhc2Rhc2Rhc2Rhc2Q=
  expiration: 86400000
